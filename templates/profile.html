<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="/static/css8.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <section class="glass-container">
        
        <div class="profile-header">
            <div class="profile-pic">
                <i class="fa-solid fa-user-astronaut"></i>
            </div>
            <h1>{{ username }}</h1> 
            <p class="status-text">Authorized User</p>
        </div>

        <div class="info-section">
            <div class="info-row">
                <span class="label">Username</span>
                <span class="value">{{ username }}</span>
            </div>
            <div class="info-row">
                <span class="label">Files Encrypted</span>
                <span class="value">{{ enc_count }}</span>
            </div>
            <div class="info-row">
                <span class="label">Files Restored</span>
                <span class="value">{{ dec_count }}</span>
            </div>
        </div>

        <div class="id-card">
            <p class="id-label">VAULT SECURITY STATUS</p>
            <div class="id-number">ACTIVE & SECURE</div>
        </div>

       <style>
            .action-buttons {
                width: 100%;
                display: flex;
                justify-content: center; /* This centers the button horizontally */
                margin-top: 30px;        /* Adds space above the button */
                margin-bottom: 20px;     /* Adds space below the button */
            }

            .btn-logout {
                padding: 12px 30px;
                background: linear-gradient(90deg, #ff4b2b, #ff416c); /* Modern Red Gradient */
                color: white;
                border: none;
                border-radius: 30px;
                font-weight: 700;
                font-size: 1rem;
                cursor: pointer;
                box-shadow: 0 4px 15px rgba(255, 75, 43, 0.3);
                transition: all 0.3s ease;
            }

            .btn-logout:hover {
                transform: scale(1.05);
                box-shadow: 0 6px 20px rgba(255, 75, 43, 0.5);
                filter: brightness(1.1);
            }
        </style>

        <div class="action-buttons">
            <a href="/logout" style="text-decoration: none;">
                <button class="btn-logout">Log Out</button>
            </a>
        </div>

        <a href="/" class="back-link">Back to Home</a>

    </section>

</body>
</html>
